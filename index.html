<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Hi</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: white;
        font-family: Arial, sans-serif;
      }
      button {
        padding: 20px 40px;
        font-size: 24px;
        cursor: pointer;
        border: none;
        background-color: #f0f0f0;
        transition: background-color 0.2s;
      }
      button:hover {
        background-color: #e0e0e0;
      }
      button:active {
        background-color: #d0d0d0;
      }
    </style>
  </head>
  <body>
    <button id="hi-btn">Hi</button>

    <script>
      const btn = document.getElementById('hi-btn');

      function playClickSound() {
        // Вставь сюда имя своего файла в кавычках!
        const audio = new Audio('click.mp3'); 
        audio.play().catch(error => {
          console.log('Не удалось воспроизвести звук. Проверь имя файла и папку:', error);
        });
      }

      btn.addEventListener('click', playClickSound);
    </script>
  </body>
</html>
