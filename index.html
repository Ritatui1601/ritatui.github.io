<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мой сайт</title>
  <style>
    /* Это минимум, чтобы кнопка просто была видна */
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
    }
    button {
      padding: 15px 30px;
      font-size: 18px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body>

  <!-- Сама кнопка -->
  <button id="myButton">Hi</button>

  <script>
    // Находим кнопку в коде
    const button = document.getElementById('myButton');

    // Функция, которая срабатывает при нажатии
    function playSound() {
      // Вариант 1: Если у тебя есть файл sound.mp3 в папке сайта
      const audio = new Audio('sound.mp3');
      
      // Пытаемся проиграть звук
      audio.play().catch(error => {
        console.log('Звук не найден или браузер заблокировал автовоспроизведение. Используем запасной вариант.');
        
        // Вариант 2 (Запасной): Если звука нет, просто меняем текст на кнопке
        button.innerText = "Я сказал Hi! 😄";
        
        // Возвращаем текст обратно через 2 секунды
        setTimeout(() => {
          button.innerText = "Hi";
        }, 2000);
      });
    }

    // Вешаем функцию на кнопку
    button.addEventListener('click', playSound);
  </script>

</body>
</html>
